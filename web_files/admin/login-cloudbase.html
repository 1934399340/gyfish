<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - CreatorHub</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 32px 40px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-form {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-footer {
            text-align: center;
            padding: 20px 40px 32px;
            border-top: 1px solid #e5e7eb;
        }

        .login-footer p {
            color: #6b7280;
            font-size: 14px;
        }

        .login-footer a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
            color: #9ca3af;
            font-size: 14px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #4f46e5;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .notification.info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .notification.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 16px;
            }

            .login-header {
                padding: 24px;
            }

            .login-form {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>👋 欢迎回来</h1>
            <p>登录 CreatorHub 管理后台</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="error-message" id="errorMessage">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <div class="success-message" id="successMessage">
                <span>✅</span>
                <span id="successText"></span>
            </div>

            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="请输入管理员邮箱"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="请输入密码"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginText">登录</span>
                <div class="spinner" id="loginSpinner" style="display: none;"></div>
            </button>
        </form>

        <div class="login-footer">
            <a href="/" class="back-link">
                <span>←</span> 返回首页
            </a>
        </div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <script src="https://img.jsdelivr.net/npm/@cloudbase/js-sdk@2.4.1/dist/cloudbase.full.js"></script>
    <script>
        // 初始化 CloudBase
        const app = cloudbase.init({
            env: 'gyfish-4gbxsy3dc619f1e8',
            region: 'ap-guangzhou'
        });

        const auth = app.auth();
        const db = app.database();

        // 获取页面元素
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const loginSpinner = document.getElementById('loginSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');

        // 显示/隐藏加载状态
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                loginText.textContent = '登录中...';
                loginSpinner.style.display = 'block';
            } else {
                loginBtn.disabled = false;
                loginText.textContent = '登录';
                loginSpinner.style.display = 'none';
            }
        }

        // 显示错误
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        // 显示成功
        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        // 显示通知
        function showNotification(type, message) {
            notification.className = `notification ${type}`;
            notificationText.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 清除错误
        function clearError() {
            errorMessage.classList.remove('show');
        }

        // 邮箱登录
        async function handleEmailLogin(email, password) {
            try {
                setLoading(true);
                clearError();

                console.log('开始邮箱登录:', email);

                // 邮箱登录
                const result = await auth.signInByEmail(email, password);

                if (result.code) {
                    throw new Error(result.message || '登录失败');
                }

                console.log('登录成功:', result);

                showSuccess('登录成功！正在跳转...');
                showNotification('success', '登录成功！正在跳转...');

                // 跳转到管理后台
                setTimeout(() => {
                    window.location.href = '/admin/index.html';
                }, 1000);

            } catch (error) {
                console.error('登录错误:', error);
                setLoading(false);
                showError(error.message || '登录失败，请检查邮箱和密码');
            }
        }

        // 检查是否已登录
        async function checkExistingSession() {
            try {
                const authState = await auth.getAuthState();
                
                if (authState && authState.user) {
                    console.log('检测到已登录用户:', authState.user);
                    
                    // 已登录，跳转到管理后台
                    showNotification('info', '已检测到登录状态，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 1000);
                    return true;
                }
                
                return false;
            } catch (error) {
                console.error('检查登录状态失败:', error);
                return false;
            }
        }

        // 表单提交
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email) {
                showError('请输入邮箱地址');
                return;
            }

            if (!password) {
                showError('请输入密码');
                return;
            }

            await handleEmailLogin(email, password);
        });

        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('页面加载，开始检查登录状态...');
            await checkExistingSession();
        });

        // 输入时清除错误
        emailInput.addEventListener('input', clearError);
        passwordInput.addEventListener('input', clearError);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户设置 - CreatorHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --gray-lighter: #cbd5e1;
            --white: #ffffff;
            --bg-light: #f8fafc;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            color: var(--dark);
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: var(--white);
            padding: 24px 0;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text { font-size: 20px; font-weight: 700; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--gray-light);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }
        
        .nav-item:hover { background: rgba(255,255,255,0.1); color: var(--white); }
        .nav-item.active { background: rgba(99,102,241,0.2); color: var(--primary-light); border-right: 3px solid var(--primary); }
        
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .header h1 { font-size: 28px; font-weight: 700; }
        
        .back-btn {
            padding: 10px 20px;
            background: var(--white);
            border: 1px solid var(--gray-lighter);
            border-radius: var(--radius);
            color: var(--dark);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .back-btn:hover { background: var(--gray-lighter); }
        
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-lighter);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .card-icon { font-size: 24px; }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .card-body {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-lighter);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            transition: var(--transition);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-hint {
            font-size: 13px;
            color: var(--gray);
            margin-top: 6px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: var(--radius);
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .message {
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: none;
        }
        
        .message.show { display: block; }
        
        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        
        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #1e40af;
        }
        
        .current-info {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .current-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-lighter);
        }
        
        .current-info-item:last-child { border-bottom: none; }
        
        .current-info-label { color: var(--gray); }
        .current-info-value { font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <span class="logo-text">CreatorHub</span>
            </div>
            
            <nav>
                <a class="nav-item" href="./index.html">
                    <span>📊</span><span>仪表盘</span>
                </a>
                <a class="nav-item" href="./content-editor.html">
                    <span>📝</span><span>内容编辑</span>
                </a>
                <a class="nav-item" href="./messages.html">
                    <span>📧</span><span>消息管理</span>
                </a>
                <a class="nav-item active" href="./account-settings.html">
                    <span>⚙️</span><span>账户设置</span>
                </a>
                <a class="nav-item" id="logoutNav">
                    <span>🚪</span><span>退出登录</span>
                </a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <h1>⚙️ 账户设置</h1>
                <a href="./index.html" class="back-btn">← 返回仪表盘</a>
            </header>
            
            <div id="message" class="message"></div>
            
            <!-- 当前账户信息 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">👤</span>
                    <h2 class="card-title">当前账户信息</h2>
                </div>
                <div class="card-body">
                    <div class="current-info">
                        <div class="current-info-item">
                            <span class="current-info-label">用户名</span>
                            <span class="current-info-value" id="currentUsername">-</span>
                        </div>
                        <div class="current-info-item">
                            <span class="current-info-label">账户创建时间</span>
                            <span class="current-info-value" id="accountCreated">-</span>
                        </div>
                        <div class="current-info-item">
                            <span class="current-info-label">上次登录</span>
                            <span class="current-info-value" id="lastLogin">-</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 修改用户名 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">✏️</span>
                    <h2 class="card-title">修改用户名</h2>
                </div>
                <div class="card-body">
                    <div class="info-box">
                        修改用户名后，下次登录请使用新的用户名。
                    </div>
                    
                    <form id="usernameForm">
                        <div class="form-group">
                            <label for="currentPasswordForUsername">当前密码（验证身份）</label>
                            <input type="password" id="currentPasswordForUsername" placeholder="请输入当前密码" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="newUsername">新用户名</label>
                            <input type="text" id="newUsername" placeholder="请输入新用户名（至少3个字符）" required minlength="3">
                        </div>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">保存用户名</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 修改密码 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🔐</span>
                    <h2 class="card-title">修改密码</h2>
                </div>
                <div class="card-body">
                    <div class="info-box">
                        为了账户安全，建议使用强密码（包含字母、数字和特殊字符）。
                    </div>
                    
                    <form id="passwordForm">
                        <div class="form-group">
                            <label for="currentPassword">当前密码</label>
                            <input type="password" id="currentPassword" placeholder="请输入当前密码" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="newPassword">新密码</label>
                            <input type="password" id="newPassword" placeholder="请输入新密码（至少4个字符）" required minlength="4">
                            <div class="form-hint">建议使用强密码以保护账户安全</div>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmPassword">确认新密码</label>
                            <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
                        </div>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">保存密码</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 重置账户（危险操作） -->
            <div class="card" style="border: 2px solid #fecaca;">
                <div class="card-header" style="background: #fef2f2;">
                    <span class="card-icon">⚠️</span>
                    <h2 class="card-title" style="color: #dc2626;">危险区域</h2>
                </div>
                <div class="card-body">
                    <div class="info-box" style="background: #fef2f2; border-color: #fecaca; color: #dc2626;">
                        <strong>警告：</strong>重置账户将删除所有账户信息，恢复为默认账户 admin/admin。此操作不可撤销！
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn btn-danger" id="resetAccountBtn">重置账户</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // API配置
        const API_BASE = '';

        // 获取账户信息
        async function getAccountInfo() {
            try {
                const response = await fetch(`${API_BASE}/api/account?action=info`);
                const result = await response.json();
                if (result.success) {
                    return result.account;
                }
                throw new Error(result.error || '获取账户信息失败');
            } catch (error) {
                console.error('获取账户信息失败:', error);
                throw error;
            }
        }

        // 显示消息
        function showMessage(type, text) {
            const msg = document.getElementById('message');
            msg.className = 'message show ' + type;
            msg.textContent = text;
            setTimeout(() => { msg.className = 'message'; }, 4000);
        }

        // 设置按钮加载状态
        function setButtonLoading(button, loading, originalText) {
            if (loading) {
                button.disabled = true;
                button.innerHTML = '处理中...';
            } else {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        // 加载账户信息
        async function loadAccountInfo() {
            try {
                const account = await getAccountInfo();
                const session = JSON.parse(localStorage.getItem('admin_session') || '{}');

                document.getElementById('currentUsername').textContent = account.username;
                document.getElementById('accountCreated').textContent = new Date(account.createdAt).toLocaleString('zh-CN');
                document.getElementById('lastLogin').textContent = session.loginTime ? new Date(session.loginTime).toLocaleString('zh-CN') : '首次登录';
            } catch (error) {
                showMessage('error', '加载账户信息失败: ' + error.message);
            }
        }

        // 修改用户名
        document.getElementById('usernameForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPasswordForUsername').value;
            const newUsername = document.getElementById('newUsername').value.trim();
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // 验证新用户名
            if (newUsername.length < 3) {
                showMessage('error', '用户名至少需要3个字符');
                return;
            }

            setButtonLoading(submitBtn, true, '保存用户名');

            try {
                const response = await fetch(`${API_BASE}/api/account?action=username`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ currentPassword, newUsername })
                });

                const result = await response.json();

                if (result.success) {
                    // 更新会话
                    const session = JSON.parse(localStorage.getItem('admin_session') || '{}');
                    session.user = { username: newUsername };
                    localStorage.setItem('admin_session', JSON.stringify(session));

                    showMessage('success', '用户名已更新为：' + newUsername);
                    loadAccountInfo();

                    // 清空表单
                    document.getElementById('currentPasswordForUsername').value = '';
                    document.getElementById('newUsername').value = '';
                } else {
                    showMessage('error', result.error || '修改失败');
                }
            } catch (error) {
                showMessage('error', '修改失败: ' + error.message);
            } finally {
                setButtonLoading(submitBtn, false, '保存用户名');
            }
        });

        // 修改密码
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // 验证新密码
            if (newPassword.length < 4) {
                showMessage('error', '新密码至少需要4个字符');
                return;
            }

            // 验证确认密码
            if (newPassword !== confirmPassword) {
                showMessage('error', '两次输入的密码不一致');
                return;
            }

            setButtonLoading(submitBtn, true, '保存密码');

            try {
                const response = await fetch(`${API_BASE}/api/admin/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('success', '密码修改成功！');

                    // 清空表单
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showMessage('error', result.error || '修改失败');
                }
            } catch (error) {
                showMessage('error', '修改失败: ' + error.message);
            } finally {
                setButtonLoading(submitBtn, false, '保存密码');
            }
        });

        // 重置账户 - 这个功能需要管理员手动在D1数据库中操作
        document.getElementById('resetAccountBtn').addEventListener('click', async () => {
            if (!confirm('确定要重置账户吗？这将恢复为默认账户 admin/admin，此操作不可撤销！')) {
                return;
            }

            if (!confirm('最后一次确认：账户将被重置为 admin/admin，继续吗？')) {
                return;
            }

            const resetBtn = document.getElementById('resetAccountBtn');
            setButtonLoading(resetBtn, true, '重置中...');

            try {
                // 调用重置API
                const response = await fetch(`${API_BASE}/api/account?action=reset`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    // 清除会话
                    localStorage.removeItem('admin_session');

                    showMessage('success', '账户已重置，正在跳转到登录页...');
                    setTimeout(() => {
                        window.location.href = './login.html';
                    }, 1500);
                } else {
                    showMessage('error', result.error || '重置失败');
                }
            } catch (error) {
                showMessage('error', '重置失败: ' + error.message);
            } finally {
                setButtonLoading(resetBtn, false, '重置账户');
            }
        });

        // 退出登录
        document.getElementById('logoutNav').addEventListener('click', () => {
            localStorage.removeItem('admin_session');
            window.location.href = './login.html';
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            const session = localStorage.getItem('admin_session');
            if (!session) {
                window.location.href = './login.html';
                return;
            }

            // 验证会话是否过期
            try {
                const sessionData = JSON.parse(session);
                if (Date.now() > sessionData.expires) {
                    localStorage.removeItem('admin_session');
                    window.location.href = './login.html';
                    return;
                }
            } catch (e) {
                localStorage.removeItem('admin_session');
                window.location.href = './login.html';
                return;
            }

            await loadAccountInfo();
        });
    </script>
</body>
</html>

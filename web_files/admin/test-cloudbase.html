<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBase 配置测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .test-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .test-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .test-header h1 { font-size: 24px; margin-bottom: 8px; }
        .test-header p { opacity: 0.9; font-size: 14px; }
        .test-content { padding: 24px; }
        .test-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .test-item h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .test-item .status {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .status.success { background: #dcfce7; color: #16a34a; }
        .status.error { background: #fef2f2; color: #dc2626; }
        .status.pending { background: #fef9c3; color: #ca8a04; }
        .status.info { background: #dbeafe; color: #2563eb; }
        .log-output {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <h1>🔧 CloudBase 配置测试</h1>
            <p>验证您的 CloudBase 环境配置是否正确</p>
        </div>
        
        <div class="test-content">
            <div class="test-item">
                <h3>📡 CloudBase SDK 加载</h3>
                <span class="status pending" id="sdkStatus">等待测试...</span>
            </div>
            
            <div class="test-item">
                <h3>🔐 CloudBase 连接</h3>
                <span class="status pending" id="connStatus">等待测试...</span>
            </div>
            
            <div class="test-item">
                <h3>🗄️ 数据库连接</h3>
                <span class="status pending" id="dbStatus">等待测试...</span>
            </div>
            
            <div class="test-item">
                <h3>👤 用户登录状态</h3>
                <span class="status pending" id="authStatus">等待测试...</span>
            </div>
            
            <div class="test-item">
                <h3>📁 存储服务</h3>
                <span class="status pending" id="storageStatus">等待测试...</span>
            </div>
            
            <div class="log-output" id="logOutput">[日志输出]\n</div>
            
            <button class="btn" id="testBtn" onclick="runTests()">
                开始测试
            </button>
        </div>
    </div>

    <script src="https://img.jsdelivr.net/npm/@cloudbase/js-sdk@2.4.1/dist/cloudbase.full.js"></script>
    <script>
        const ENV_ID = 'gyfish-4gbxsy3dc619f1e8';
        const log = document.getElementById('logOutput');
        
        function logMsg(msg, type = 'info') {
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            log.textContent += `${prefix} ${msg}\n`;
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }
        
        function setStatus(id, status, text) {
            document.getElementById(id).className = `status ${status}`;
            document.getElementById(id).textContent = text;
        }
        
        async function runTests() {
            const btn = document.getElementById('testBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 测试中...';
            log.textContent = '';
            
            // Test 1: SDK Loading
            logMsg('测试1: 检查 CloudBase SDK...');
            try {
                if (window.cloudbase) {
                    logMsg('CloudBase SDK 已加载', 'success');
                    setStatus('sdkStatus', 'success', '加载成功');
                } else {
                    throw new Error('SDK 未找到');
                }
            } catch (e) {
                logMsg('SDK 加载失败: ' + e.message, 'error');
                setStatus('sdkStatus', 'error', '加载失败');
            }
            
            // Test 2: Connection
            logMsg('\n测试2: 连接 CloudBase...');
            try {
                const app = cloudbase.init({
                    env: ENV_ID,
                    region: 'ap-guangzhou'
                });
                logMsg('CloudBase 连接成功', 'success');
                setStatus('connStatus', 'success', '连接成功');
                
                // Test 3: Database
                logMsg('\n测试3: 测试数据库连接...');
                try {
                    const db = app.database();
                    const res = await db.collection('users').count();
                    logMsg(`数据库连接成功，用户集合记录数: ${res.total}`, 'success');
                    setStatus('dbStatus', 'success', `连接成功 (${res.total} 条记录)`);
                } catch (e) {
                    logMsg('数据库查询失败: ' + e.message, 'error');
                    setStatus('dbStatus', 'error', '连接失败');
                }
                
                // Test 4: Auth
                logMsg('\n测试4: 检查用户登录状态...');
                try {
                    const auth = app.auth();
                    const authState = await auth.getAuthState();
                    if (authState && authState.user) {
                        logMsg(`当前用户: ${authState.user.email || authState.user.uid}`, 'success');
                        setStatus('authStatus', 'success', `已登录: ${authState.user.email || authState.user.uid}`);
                    } else {
                        logMsg('当前未登录（这是正常的）', 'info');
                        setStatus('authStatus', 'info', '未登录');
                    }
                } catch (e) {
                    logMsg('获取登录状态失败: ' + e.message, 'error');
                    setStatus('authStatus', 'error', '获取失败');
                }
                
                // Test 5: Storage
                logMsg('\n测试5: 检查存储服务...');
                try {
                    const tempRes = await app.getTempFileURL({
                        fileList: []
                    });
                    logMsg('存储服务正常', 'success');
                    setStatus('storageStatus', 'success', '服务正常');
                } catch (e) {
                    logMsg('存储服务测试跳过（无文件）', 'info');
                    setStatus('storageStatus', 'info', '服务正常');
                }
                
            } catch (e) {
                logMsg('CloudBase 连接失败: ' + e.message, 'error');
                setStatus('connStatus', 'error', '连接失败');
            }
            
            logMsg('\n========== 测试完成 ==========', 'info');
            btn.disabled = false;
            btn.textContent = '重新测试';
        }
        
        // Auto run on load
        window.onload = () => {
            setTimeout(runTests, 500);
        };
    </script>
</body>
</html>

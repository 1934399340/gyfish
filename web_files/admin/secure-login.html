<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全管理员登录 - CreatorHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #312e81 0%, #1e3a8a 100%);
            color: white;
            padding: 32px 40px;
            text-align: center;
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .security-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 12px;
        }
        .login-form {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #312e81;
            box-shadow: 0 0 0 3px rgba(49, 46, 129, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #312e81 0%, #1e3a8a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(49, 46, 129, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 16px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            display: none;
        }
        .message.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        .security-info {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 10px;
            padding: 20px;
            margin: 24px 0;
        }
        .security-info h3 {
            color: #92400e;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .security-info ul {
            color: #92400e;
            padding-left: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .access-code-section {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 20px;
            margin: 24px 0;
        }
        .access-code-section h3 {
            color: #0369a1;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .access-code-input {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .code-digit {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #bae6fd;
            border-radius: 8px;
            outline: none;
        }
        .code-digit:focus {
            border-color: #0369a1;
            box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.1);
        }
        .two-factor-section {
            text-align: center;
            padding: 30px 20px;
        }
        .qr-code-placeholder {
            width: 150px;
            height: 150px;
            background: #f3f4f6;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔒 管理员专区</h1>
            <p>CreatorHub 安全管理后台</p>
            <div class="security-badge">🔒 超级管理员专用</div>
        </div>
        
        <div class="login-form">
            <div class="message error" id="errorMessage">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>
            
            <div class="message success" id="successMessage">
                <span>✅</span>
                <span id="successText"></span>
            </div>
            
            <div class="message info" id="infoMessage">
                <span>ℹ️</span>
                <span id="infoText"></span>
            </div>
            
            <!-- 安全说明 -->
            <div class="security-info">
                <h3>🛡️ 安全验证</h3>
                <ul>
                    <li>仅限授权管理员访问</li>
                    <li>多层身份验证保护</li>
                    <li>会话自动超时保护</li>
                    <li>IP地址访问限制</li>
                </ul>
            </div>
            
            <!-- 访问码验证 -->
            <div class="access-code-section">
                <h3>🔢 访问码验证</h3>
                <p>请输入6位数字访问码：</p>
                <div class="access-code-input">
                    <input type="text" class="code-digit" maxlength="1" data-index="0">
                    <input type="text" class="code-digit" maxlength="1" data-index="1">
                    <input type="text" class="code-digit" maxlength="1" data-index="2">
                    <input type="text" class="code-digit" maxlength="1" data-index="3">
                    <input type="text" class="code-digit" maxlength="1" data-index="4">
                    <input type="text" class="code-digit" maxlength="1" data-index="5">
                </div>
                <p style="font-size: 12px; color: #6b7280; margin-top: 10px;">
                    访问码已发送至您的注册邮箱
                </p>
            </div>
            
            <!-- 邮箱密码登录 -->
            <div class="form-group">
                <label for="adminEmail">管理员邮箱</label>
                <input type="email" id="adminEmail" placeholder="请输入授权邮箱">
            </div>
            
            <div class="form-group">
                <label for="adminPassword">管理员密码</label>
                <input type="password" id="adminPassword" placeholder="请输入密码">
            </div>
            
            <!-- 两步验证 -->
            <div class="two-factor-section">
                <h3>📱 两步验证</h3>
                <div class="qr-code-placeholder">
                    两步验证QR码<br>将在此处显示
                </div>
                <p style="font-size: 14px; color: #6b7280; margin: 15px 0;">
                    请使用身份验证器应用扫描二维码
                </p>
                <input type="text" id="twoFactorCode" placeholder="输入6位验证码" 
                       style="width: 150px; padding: 10px; text-align: center; border: 2px solid #d1d5db; border-radius: 8px;">
            </div>
            
            <button class="btn-login" id="loginBtn">
                <span id="loginText">安全登录</span>
                <div class="spinner" id="loginSpinner" style="display: none;"></div>
            </button>
        </div>
    </div>

    <script src="https://img.jsdelivr.net/npm/@cloudbase/js-sdk@2.4.1/dist/cloudbase.full.js"></script>
    <script>
        // 初始化 CloudBase
        const app = cloudbase.init({
            env: 'gyfish-4gbxsy3dc619f1e8',
            region: 'ap-guangzhou'
        });
        const auth = app.auth();

        // DOM 元素
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const loginSpinner = document.getElementById('loginSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const infoMessage = document.getElementById('infoMessage');
        const errorText = document.getElementById('errorText');
        const successText = document.getElementById('successText');
        const infoText = document.getElementById('infoText');

        // 访问码输入处理
        const codeInputs = document.querySelectorAll('.code-digit');
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < codeInputs.length - 1) {
                    codeInputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    codeInputs[index - 1].focus();
                }
            });
        });

        // 获取完整访问码
        function getAccessCode() {
            return Array.from(codeInputs).map(input => input.value).join('');
        }

        // 显示消息
        function showMessage(type, message) {
            // 隐藏所有消息
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            infoMessage.classList.remove('show');
            
            // 显示指定消息
            const messageMap = {
                'error': errorMessage,
                'success': successMessage,
                'info': infoMessage
            };
            
            const textMap = {
                'error': errorText,
                'success': successText,
                'info': infoText
            };
            
            if (messageMap[type]) {
                textMap[type].textContent = message;
                messageMap[type].classList.add('show');
            }
        }

        // 设置加载状态
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                loginText.textContent = '验证中...';
                loginSpinner.style.display = 'block';
            } else {
                loginBtn.disabled = false;
                loginText.textContent = '安全登录';
                loginSpinner.style.display = 'none';
            }
        }

        // 安全登录验证
        async function secureLogin() {
            const accessCode = getAccessCode();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const twoFactorCode = document.getElementById('twoFactorCode').value.trim();
            
            // 基础验证
            if (accessCode.length !== 6) {
                showMessage('error', '请输入完整的6位访问码');
                return;
            }
            
            if (!email || !password) {
                showMessage('error', '请输入邮箱和密码');
                return;
            }
            
            if (twoFactorCode.length !== 6) {
                showMessage('error', '请输入6位两步验证代码');
                return;
            }
            
            // 预定义的管理员凭据（实际应该从安全配置中读取）
            const ADMIN_EMAIL = '1934399340@qq.com';
            const ADMIN_ACCESS_CODE = '123456'; // 实际应该动态生成
            const ADMIN_TWO_FACTOR_SECRET = 'GYFISH_ADMIN_SECRET'; // 实际应该安全存储
            
            try {
                setLoading(true);
                showMessage('info', '正在进行多重安全验证...');
                
                // 1. 验证访问码
                if (accessCode !== ADMIN_ACCESS_CODE) {
                    throw new Error('访问码错误');
                }
                
                // 2. 验证邮箱
                if (email !== ADMIN_EMAIL) {
                    throw new Error('未授权的邮箱地址');
                }
                
                // 3. 验证两步验证码（简化验证，实际应该使用TOTP算法）
                const expectedCode = generateTOTP(ADMIN_TWO_FACTOR_SECRET);
                if (twoFactorCode !== expectedCode) {
                    throw new Error('两步验证代码错误');
                }
                
                // 4. 执行登录
                showMessage('info', '访问码验证通过，正在登录...');
                await new Promise(resolve => setTimeout(resolve, 1000)); // 模拟延迟
                
                // 5. 邮箱密码验证（实际应该查询安全数据库）
                const result = await auth.signInWithEmailAndPassword(email, password);
                
                if (result.code) {
                    throw new Error(result.message);
                }
                
                showMessage('success', '✅ 安全验证通过！正在进入管理后台...');
                
                // 跳转到管理后台
                setTimeout(() => {
                    window.location.href = './dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('登录失败:', error);
                showMessage('error', error.message || '登录验证失败');
                setLoading(false);
            }
        }

        // 简化的TOTP生成（实际应该使用crypto库）
        function generateTOTP(secret) {
            // 这里应该是真实的TOTP实现
            // 简化示例：基于时间的固定代码
            const timeSlot = Math.floor(Date.now() / 30000);
            return String(timeSlot % 1000000).padStart(6, '0');
        }

        // GitHub OAuth回调处理
        function handleGitHubCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            if (error) {
                showMessage('error', `GitHub授权失败: ${error}`);
                // 清除URL参数
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }
            
            if (code) {
                showLoading(true, '正在处理GitHub授权...');
                processGitHubCallback(code);
                // 清除URL参数
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // 处理GitHub回调
        async function processGitHubCallback(code) {
            try {
                const result = await wx.cloud.callFunction({
                    name: 'github-auth',
                    data: {
                        action: 'handleCallback',
                        code: code
                    }
                });
                
                if (result.result.success) {
                    const userInfo = result.result.userInfo;
                    showMessage('success', `欢迎回来，${userInfo.name}！`);
                    
                    // 存储用户信息到本地存储
                    localStorage.setItem('admin_github_user', JSON.stringify(userInfo));
                    localStorage.setItem('admin_auth_method', 'github');
                    
                    // 设置会话标识
                    sessionStorage.setItem('admin_authenticated', 'true');
                    sessionStorage.setItem('admin_session_start', Date.now().toString());
                    
                    // 3秒后跳转到管理后台
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 3000);
                } else {
                    throw new Error(result.result.error || 'GitHub认证失败');
                }
            } catch (error) {
                console.error('GitHub回调处理错误:', error);
                showMessage('error', error.message || 'GitHub认证过程中出现错误');
                showLoading(false);
            }
        }

        // GitHub登录处理
        async function handleGitHubLogin() {
            showLoading(true, '正在处理GitHub登录...');
            
            try {
                // 调用云函数获取授权URL
                const result = await wx.cloud.callFunction({
                    name: 'github-auth',
                    data: {
                        action: 'getAuthorizationUrl'
                    }
                });
                
                if (result.result.success) {
                    // 跳转到GitHub授权页面
                    window.location.href = result.result.authorizationUrl;
                } else {
                    throw new Error(result.result.error || '获取授权链接失败');
                }
            } catch (error) {
                console.error('GitHub登录错误:', error);
                showMessage('error', 'GitHub登录配置有误，请联系管理员');
                showLoading(false);
            }
        }

        // 页面加载完成后检查GitHub回调
        document.addEventListener('DOMContentLoaded', function() {
            handleGitHubCallback();
        });

        // 登录按钮事件
        loginBtn.addEventListener('click', secureLogin);

        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', () => {
            showMessage('info', '请输入访问码开始安全验证');
            
            // 自动聚焦第一个输入框
            codeInputs[0].focus();
        });

        // 输入时清除错误消息
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                errorMessage.classList.remove('show');
            });
        });
    </script>
</body>
</html>

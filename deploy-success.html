<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部署成功 - CreatorHub</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .success-container {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pulse 2s infinite;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        h1 {
            color: var(--dark);
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        p {
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.9rem;
            color: #64748b;
        }
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @media (max-width: 640px) {
            .success-container {
                padding: 1.5rem;
            }
            .stats {
                flex-direction: column;
                gap: 1rem;
            }
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        
        <h1>部署成功！</h1>
        <p>恭喜！您的CreatorHub网站已成功部署到腾讯云CloudBase</p>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-number">100%</span>
                <span class="stat-label">部署完成</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">⚡</span>
                <span class="stat-label">性能优化</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">🔒</span>
                <span class="stat-label">安全防护</span>
            </div>
        </div>
        
        <div class="actions">
            <a href="index.html" class="btn btn-primary">访问主页</a>
            <a href="portfolio.html" class="btn btn-outline">查看作品</a>
            <a href="https://console.cloud.tencent.com/tcb" class="btn btn-outline" target="_blank">CloudBase控制台</a>
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.9rem;">
            感谢使用腾讯云CloudBase服务<br>
            如需帮助，请查看部署文档
        </p>
    </div>
</body>
</html>

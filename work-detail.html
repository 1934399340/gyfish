<head>
    <meta charset="UTF-8">

    <style>
        .work-header {
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            color: white;
            padding: 80px 0 60px;
            position: relative;
            overflow: hidden;
        }
        
        .work-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 50%);
        }
        
        .work-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        
        .work-showcase {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        .work-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .gallery-item {
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4/3;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .work-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .work-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
        }
        
        .work-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .work-description {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        
        .work-tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .work-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }
        
        .work-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn-work {
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary-work {
            background: white;
            color: #7c3aed;
        }
        
        .btn-primary-work:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3);
        }
        
        .btn-outline-work {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .btn-outline-work:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }
        
        .work-content {
            background: white;
            border-radius: 25px;
            padding: 60px;
            margin: -40px auto 60px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 2;
        }
        
        .work-details {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
            margin-bottom: 50px;
        }
        
        .details-main {
            font-size: 18px;
            line-height: 1.8;
            color: #374151;
        }
        
        .details-main h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 2.5rem 0 1.5rem;
            color: #1e293b;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .details-main h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1.2rem;
            color: #1e293b;
        }
        
        .details-main p {
            margin-bottom: 1.5rem;
        }
        
        .details-main ul {
            margin: 1.5rem 0;
            padding-left: 2rem;
        }
        
        .details-main li {
            margin-bottom: 0.8rem;
        }
        
        .technical-specs {
            background: #f8fafc;
            padding: 30px;
            border-radius: 16px;
        }
        
        .specs-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e293b;
        }
        
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .spec-item:last-child {
            border-bottom: none;
        }
        
        .spec-label {
            font-weight: 500;
            color: #64748b;
        }
        
        .spec-value {
            color: #1e293b;
            font-weight: 500;
        }
        
        .work-process {
            margin-top: 60px;
        }
        
        .process-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 40px;
            color: #1e293b;
        }
        
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #e2e8f0;
            transform: translateX(-50%);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 50px;
            width: calc(50% - 40px);
        }
        
        .timeline-item:nth-child(odd) {
            left: 0;
        }
        
        .timeline-item:nth-child(even) {
            left: calc(50% + 40px);
        }
        
        .timeline-point {
            position: absolute;
            top: 20px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #7c3aed;
            border: 4px solid white;
            box-shadow: 0 0 0 4px #e2e8f0;
        }
        
        .timeline-item:nth-child(odd) .timeline-point {
            right: -50px;
        }
        
        .timeline-item:nth-child(even) .timeline-point {
            left: -50px;
        }
        
        .timeline-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }
        
        .timeline-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1e293b;
        }
        
        .timeline-desc {
            color: #64748b;
            line-height: 1.6;
        }
        
        .related-works {
            background: #f8fafc;
            padding: 80px 0;
            margin-top: 60px;
        }
        
        .related-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 40px;
            color: #1e293b;
        }
        
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .related-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .related-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .related-image {
            height: 220px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .related-content {
            padding: 24px;
        }
        
        .related-title-small {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1e293b;
        }
        
        .related-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 16px;
        }
        
        @media (max-width: 992px) {
            .work-showcase {
                grid-template-columns: 1fr;
            }
            
            .work-details {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .timeline-item {
                width: 100%;
                left: 0 !important;
            }
            
            .timeline-item:nth-child(even) {
                left: 0 !important;
            }
            
            .timeline-point {
                left: -12px !important;
                right: auto !important;
            }
            
            .timeline::before {
                left: 10px;
            }
        }
        
        @media (max-width: 768px) {
            .work-header {
                padding: 60px 0 40px;
            }
            
            .work-title {
                font-size: 2.2rem;
            }
            
            .work-content {
                padding: 30px 20px;
                margin: -20px 20px 40px;
            }
            
            .work-info {
                padding: 25px;
            }
            
            .work-gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // 获取作品ID
        const urlParams = new URLSearchParams(window.location.search);
        const workId = urlParams.get('id') || '1';

        // 模拟作品数据
        const works = {
            '1': {
                title: '城市风光延时摄影',
                description: '记录上海24小时的城市变迁，从晨曦到夜幕，捕捉都市生活的韵律与美感',
                content: `
                    <h2>创作理念</h2>
                    <p>这座城市从不睡眠，每一刻都在诉说着不同的故事。我想要通过延时摄影的方式，浓缩24小时的城市脉搏，让人们看到平时忽略的美好瞬间。</p>
                    
                    <h2>技术挑战</h2>
                    <p>这次拍摄最大的挑战是如何在保证画质的同时，处理巨大的数据量。单个片段就需要200GB的存储空间，整个项目累计超过2TB的数据。</p>
                    
                    <h2>拍摄过程</h2>
                    <p>从外滩的黎明开始，到陆家嘴的华灯初上，再到深夜的霓虹闪烁。每一个机位的选择都经过精心考量，既要保证视野开阔，又要避开人流干扰。</p>
                    
                    <h2>后期制作</h2>
                    <p>使用Adobe Premiere Pro进行剪辑，After Effects处理特效，DaVinci Resolve负责调色。整个后期流程耗时两周，力求在保持真实感的同时增强视觉冲击力。</p>
                `,
                tags: ['摄影', '风光', '延时', '城市'],
                date: '2024-03-05',
                duration: '3分45秒',
                equipment: 'Canon EOS R5 + 10-20mm f/4',
                software: 'Adobe Creative Suite',
                location: '上海外滩、陆家嘴',
                category: '风光摄影',
                gallery: ['🌆', '🌃', '🌉', '🏙️']
            },
            '2': {
                title: '品牌形象宣传片',
                description: '为新兴科技公司打造的品牌形象片，展现创新精神与未来愿景',
                content: `
                    <h2>项目背景</h2>
                    <p>客户是一家专注于人工智能解决方案的初创公司，希望通过这部宣传片传达他们的技术实力和企业价值观。</p>
                    
                    <h2>创意构思</h2>
                    <p>我们以"连接未来"为主题，通过抽象的视觉语言展现AI技术如何改变人类生活。采用了大量动态图形和粒子效果来表现数据流动的概念。</p>
                    
                    <h2>拍摄亮点</h2>
                    <ul>
                        <li>使用无人机航拍展示公司办公环境</li>
                        <li>绿幕拍摄结合后期合成创造虚拟场景</li>
                        <li>高速摄影捕捉产品细节</li>
                        <li>4K HDR录制确保最高画质</li>
                    </ul>
                    
                    <h2>技术规格</h2>
                    <p>全片采用电影级4K分辨率拍摄，帧率根据不同场景在24fps-120fps之间切换。色彩分级参考了科技感强烈的蓝紫色调，配合动态光效增强未来感。</p>
                `,
                tags: ['视频', '品牌', '宣传片', '科技'],
                date: '2024-02-28',
                duration: '2分15秒',
                equipment: 'Sony FX6 + FE 24-70mm f/2.8',
                software: 'Premiere Pro + After Effects',
                location: '客户办公室及摄影棚',
                category: '商业视频',
                gallery: ['🎥', '💻', '🚀', '💡']
            }
        };

                        </div>
                    </div>
                </div>
                
                <section class="related-works">
                    <h2 class="related-title">其他作品</h2>
                    <div class="related-grid">
                        <div class="related-card">
                            <div class="related-image">🎬</div>
                            <div class="related-content">
                                <h3 class="related-title-small">商业广告片</h3>
                                <p>为知名品牌制作的产品推广视频</p>
                                <div class="related-meta">
                                    <span>2024-02-20</span>
                                    <span>1分45秒</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="related-card">
                            <div class="related-image">📸</div>
                            <div class="related-content">
                                <h3 class="related-title-small">人像写真集</h3>
                                <p>时尚人像摄影作品，展现人物个性魅力</p>

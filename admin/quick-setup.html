<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速账户设置 - CreatorHub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            color: #1e293b;
            margin-bottom: 12px;
            font-size: 28px;
        }
        .header p {
            color: #64748b;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        .message {
            padding: 16px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }
        .message.show {
            display: block;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .message.info {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .instructions {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
        }
        .instructions h3 {
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .instructions ul {
            color: #64748b;
            padding-left: 20px;
            margin: 0;
        }
        .instructions li {
            margin-bottom: 8px;
        }
        .login-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }
        .option-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .option-card:hover {
            transform: translateY(-4px);
            border-color: #4f46e5;
        }
        .option-card.selected {
            border-color: #4f46e5;
            background: #eef2ff;
        }
        .option-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .option-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .option-desc {
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="header">
            <h1>🔐 账户设置向导</h1>
            <p>为 CreatorHub 管理后台创建登录账户</p>
        </div>
        
        <div class="instructions">
            <h3>📋 登录方式选择</h3>
            <div class="login-options">
                <div class="option-card" onclick="selectOption('email')">
                    <div class="option-icon">📧</div>
                    <div class="option-title">邮箱登录</div>
                    <div class="option-desc">简单快捷，推荐使用</div>
                </div>
                <div class="option-card" onclick="selectOption('github')">
                    <div class="option-icon">🐙</div>
                    <div class="option-title">GitHub登录</div>
                    <div class="option-desc">需要额外配置</div>
                </div>
            </div>
        </div>
        
        <div id="emailSetup" style="display: none;">
            <div class="message info show">
                <strong>💡 推荐方式：</strong>邮箱登录最简单直接
            </div>
            
            <form id="emailForm">
                <div class="form-group">
                    <label for="email">管理员邮箱</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">设置密码</label>
                    <input type="password" id="password" class="form-control" placeholder="至少6位字符" minlength="6" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="再次输入密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary">创建账户并登录</button>
            </form>
        </div>
        
        <div id="githubSetup" style="display: none;">
            <div class="message info show">
                <strong>🔧 GitHub登录配置说明：</strong>
            </div>
            <div class="instructions">
                <ul>
                    <li>在GitHub Developer Settings创建OAuth应用</li>
                    <li>回调URL设置为：https://gyfish-4gbxsy3dc619f1e8.service.tcloudbase.com/auth/callback</li>
                    <li>在CloudBase控制台配置GitHub登录</li>
                    <li>获取Client ID和Secret并配置</li>
                </ul>
            </div>
            <button class="btn btn-primary" onclick="window.location.href='./unified-login.html'">
                先试用邮箱登录
            </button>
        </div>
        
        <div class="message" id="resultMessage"></div>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="./unified-login.html" style="color: #4f46e5; text-decoration: none; font-size: 14px;">
                ← 返回登录页面
            </a>
        </div>
    </div>

    <script src="https://img.jsdelivr.net/npm/@cloudbase/js-sdk@2.4.1/dist/cloudbase.full.js"></script>
    <script>
        // 初始化 CloudBase
        const app = cloudbase.init({
            env: 'gyfish-4gbxsy3dc619f1e8',
            region: 'ap-guangzhou'
        });
        const auth = app.auth();

        let selectedOption = null;

        // 选择登录方式
        function selectOption(option) {
            selectedOption = option;
            
            // 更新UI
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // 显示对应设置界面
            document.getElementById('emailSetup').style.display = option === 'email' ? 'block' : 'none';
            document.getElementById('githubSetup').style.display = option === 'github' ? 'block' : 'none';
        }

        // 邮箱注册表单
        document.getElementById('emailForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 验证
            if (password !== confirmPassword) {
                showMessage('error', '两次输入的密码不一致');
                return;
            }
            
            if (password.length < 6) {
                showMessage('error', '密码长度至少6位');
                return;
            }
            
            try {
                showMessage('info', '正在创建账户...');
                
                // 创建用户
                const result = await auth.signUpWithEmailAndPassword(email, password);
                
                if (result.code) {
                    throw new Error(result.message);
                }
                
                showMessage('success', `✅ 账户创建成功！邮箱：${email}\n正在自动登录...`);
                
                // 自动登录
                setTimeout(async () => {
                    try {
                        await auth.signInWithEmailAndPassword(email, password);
                        showMessage('success', '登录成功！正在跳转到管理后台...');
                        setTimeout(() => {
                            window.location.href = './dashboard.html';
                        }, 1500);
                    } catch (loginError) {
                        showMessage('error', `登录失败：${loginError.message}`);
                    }
                }, 1000);
                
            } catch (error) {
                console.error('账户创建失败:', error);
                showMessage('error', `创建失败：${error.message}`);
            }
        });

        // 显示消息
        function showMessage(type, message) {
            const messageEl = document.getElementById('resultMessage');
            messageEl.className = `message ${type} show`;
            messageEl.innerHTML = message.replace(/\n/g, '<br>');
        }

        // 页面加载检查
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const authState = await auth.getAuthState();
                if (authState && authState.user) {
                    showMessage('success', `ℹ️ 检测到已登录用户：${authState.user.email}\n<a href='./dashboard.html'>点击进入管理后台</a>`);
                }
            } catch (error) {
                console.log('未检测到登录状态');
            }
        });
    </script>
</body>
</html>
